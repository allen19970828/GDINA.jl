name: Upstream Tracker

on:
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at 00:00 UTC
  workflow_dispatch: # Enable manual triggering

permissions:
  issues: write
  contents: read

jobs:
  check-upstream:
    name: Check R GDINA Upstream Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GDINA.jl
        uses: actions/checkout@v4

      - name: Fetch and Compare Version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get current synced version
          local_ver=$(cat upstream_version.txt | xargs)
          echo "Currently synced local version: '$local_ver'"

          # Fetch latest DESCRIPTION from wenchao-ma/GDINA master
          desc_content=$(curl -s https://raw.githubusercontent.com/wenchao-ma/GDINA/master/DESCRIPTION)
          upstream_ver=$(echo "$desc_content" | grep -i '^Version:' | awk '{print $2}' | xargs)
          echo "Latest upstream R GDINA version: '$upstream_ver'"

          if [ -z "$upstream_ver" ]; then
            echo "Error: Could not retrieve upstream version."
            exit 1
          fi

          if [ "$local_ver" != "$upstream_ver" ]; then
            echo "Version mismatch detected!"
            
            # Check if an issue with this version is already open to prevent duplicates
            existing_issue=$(gh issue list --search "Upstream R GDINA New Version Detected: $upstream_ver in:title" --json number --jq '.[0].number')
            
            if [ -z "$existing_issue" ]; then
              echo "Creating GitHub Issue for version $upstream_ver..."
              gh issue create \
                --title "🔔 Upstream R GDINA New Version Detected: $upstream_ver" \
                --body "Hello @allen19970828! 

The automatic Upstream Tracker has detected a new version of the R GDINA package:
* **Upstream Version:** \`$upstream_ver\`
* **Currently Synced Version:** \`$local_ver\`

Please review the changes in the [wenchao-ma/GDINA](https://github.com/wenchao-ma/GDINA) repository and check if there are any algorithmic updates, bug fixes, or new models that need to be ported to **GDINA.jl**.

*After syncing the changes, please update the version inside \`upstream_version.txt\` in the root of the project to close this cycle.*"
            else
              echo "Issue #$existing_issue already exists for this version. Skipping creation."
            fi
          else
            echo "Success: GDINA.jl is fully in sync with upstream version $upstream_ver."
          fi
