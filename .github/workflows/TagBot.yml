name: TagBot
on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write
jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.event.comment.body == '@JuliaRegistrator register'
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
